<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Game | Ashwaq Kamal</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f7fa;
    text-align:center;
    color:#444;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

#scoreboard{
    font-size:20px;
    margin-bottom:15px;
}

canvas{
    background:#111;
    border:4px solid #777;
    border-radius:10px;
    width:100%;
    max-width:500px;
    height:auto;
}

.controls{
    margin-top:20px;
}

.controls button{
    width:70px;
    height:70px;
    font-size:28px;
    margin:4px;
    border:none;
    border-radius:10px;
    background:#666;
    color:white;
    cursor:pointer;
}

.controls button:hover{
    background:#555;
}

#gameOverScreen{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    justify-content:center;
    align-items:center;
}

#gameOverBox{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
}

#gameOverBox button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#666;
    color:white;
    cursor:pointer;
    font-size:16px;
}

#gameOverBox button:hover{
    background:#555;
}

</style>
</head>

<body>

<div class="container">

<h1>Snake Game</h1>

<p>
Designed by Ashwaq Kamal as part of her STEM and Computer Science portfolio.
</p>

<div id="scoreboard">
Score: <span id="score">0</span>
|
High Score: <span id="highscore">0</span>
</div>

<canvas id="game" width="500" height="500"></canvas>

<div class="controls">

<div>
<button onclick="setDirection('up')">↑</button>
</div>

<div>
<button onclick="setDirection('left')">←</button>
<button onclick="setDirection('down')">↓</button>
<button onclick="setDirection('right')">→</button>
</div>

</div>

</div>

<div id="gameOverScreen">

<div id="gameOverBox">

<h2>Game Over</h2>

<p>
Final Score:
<strong id="finalScore">0</strong>
</p>

<button onclick="restartGame()">
Play Again
</button>

</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const boardSize = 500;

let snake;
let dx;
let dy;
let food;
let score;
let loop;

let highScore =
localStorage.getItem("snakeHighScore") || 0;

document.getElementById("highscore").textContent =
highScore;

function randomFood(){

return{
x:Math.floor(Math.random()*25)*20,
y:Math.floor(Math.random()*25)*20
};

}

function initializeGame(){

snake=[
{x:240,y:240}
];

dx=grid;
dy=0;

food=randomFood();

score=0;

document.getElementById("score").textContent=score;

document.getElementById("gameOverScreen")
.style.display="none";

clearInterval(loop);

loop=setInterval(draw,170);

}

function setDirection(direction){

if(direction==="up" && dy===0){
dx=0;
dy=-grid;
}

if(direction==="down" && dy===0){
dx=0;
dy=grid;
}

if(direction==="left" && dx===0){
dx=-grid;
dy=0;
}

if(direction==="right" && dx===0){
dx=grid;
dy=0;
}

}

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowUp" || e.key==="w"){
setDirection("up");
}

if(e.key==="ArrowDown" || e.key==="s"){
setDirection("down");
}

if(e.key==="ArrowLeft" || e.key==="a"){
setDirection("left");
}

if(e.key==="ArrowRight" || e.key==="d"){
setDirection("right");
}

});

function draw(){

ctx.clearRect(0,0,boardSize,boardSize);

for(let i=0;i<boardSize;i+=grid){

ctx.strokeStyle="#222";

ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,boardSize);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i);
ctx.lineTo(boardSize,i);
ctx.lineTo(boardSize,i);
ctx.stroke();

}

const head={
x:snake[0].x+dx,
y:snake[0].y+dy
};

snake.unshift(head);

if(head.x===food.x && head.y===food.y){

score++;

document.getElementById("score").textContent=
score;

food=randomFood();

}else{

snake.pop();

}

ctx.fillStyle="#ff4444";

ctx.beginPath();
ctx.roundRect(food.x,food.y,20,20,4);
ctx.fill();

snake.forEach((segment,index)=>{

if(index===0){

ctx.fillStyle="#00ff88";

}else{

ctx.fillStyle="#00cc66";

}

ctx.beginPath();
ctx.roundRect(
segment.x,
segment.y,
20,
20,
5
);

ctx.fill();

});

if(
head.x<0 ||
head.x>=boardSize ||
head.y<0 ||
head.y>=boardSize
){
endGame();
}

for(let i=1;i<snake.length;i++){

if(
head.x===snake[i].x &&
head.y===snake[i].y
){
endGame();
}

}

}

function endGame(){

clearInterval(loop);

if(score>highScore){

highScore=score;

localStorage.setItem(
"snakeHighScore",
highScore
);

document.getElementById("highscore")
.textContent=highScore;

}

document.getElementById("finalScore")
.textContent=score;

document.getElementById("gameOverScreen")
.style.display="flex";

}

function restartGame(){

initializeGame();

}

initializeGame();

</script>

</body>
</html>
