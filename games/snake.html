<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#f5f5f5;
}

canvas{
    background:black;
    margin-top:20px;
    border:3px solid #666;
}

button{
    padding:10px 20px;
    margin-top:15px;
}

</style>

</head>

<body>

<h1>Snake Game</h1>

<p>Use Arrow Keys to Move</p>

<canvas id="game" width="400" height="400"></canvas>

<br>

<button onclick="location.reload()">Restart</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const grid=20;

let snake=[
    {x:160,y:160}
];

let dx=grid;
let dy=0;

let food={
    x:200,
    y:200
};

let score=0;

document.addEventListener("keydown",changeDirection);

function changeDirection(e){

if(e.key==="ArrowUp" && dy===0){
dx=0;
dy=-grid;
}

if(e.key==="ArrowDown" && dy===0){
dx=0;
dy=grid;
}

if(e.key==="ArrowLeft" && dx===0){
dx=-grid;
dy=0;
}

if(e.key==="ArrowRight" && dx===0){
dx=grid;
dy=0;
}

}

function draw(){

ctx.clearRect(0,0,400,400);

snake.unshift({
x:snake[0].x+dx,
y:snake[0].y+dy
});

if(
snake[0].x===food.x &&
snake[0].y===food.y
){

score++;

food={
x:Math.floor(Math.random()*20)*20,
y:Math.floor(Math.random()*20)*20
};

}
else{
snake.pop();
}

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);

ctx.fillStyle="lime";

snake.forEach(part=>{
ctx.fillRect(part.x,part.y,20,20);
});

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,10,25);

if(
snake[0].x<0 ||
snake[0].x>=400 ||
snake[0].y<0 ||
snake[0].y>=400
){
alert("Game Over! Score: "+score);
location.reload();
}

for(let i=1;i<snake.length;i++){

if(
snake[0].x===snake[i].x &&
snake[0].y===snake[i].y
){
alert("Game Over! Score: "+score);
location.reload();
}

}

}

setInterval(draw,100);

</script>

</body>
</html>
